<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Virtual Book Resume</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Source+Serif+4:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="scene">
      <div class="book closed" id="book" aria-label="Virtual resume book">
        <div class="cover" aria-hidden="true">
          <span class="cover-mark">Resume</span>
          <h1>Virtual Book</h1>
          <p>Click the center node to open</p>
          <button class="node" id="openNode" aria-label="Open book">
            Open
          </button>
        </div>

        <div class="spread" id="spread">
          <section class="page left-page" id="leftPage">
            <h2>Resume Index</h2>
            <p class="index-note">Tap a section for direct access.</p>
            <nav>
              <ul id="indexList"></ul>
            </nav>
          </section>

          <section
            class="page right-page"
            id="rightPage"
            aria-live="polite"
          ></section>
        </div>
      </div>
    </main>

    <script src="main.js"></script>
  </body>
</html>
